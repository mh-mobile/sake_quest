name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: JS構文チェック(index.html / sw.js / manifest)
        run: |
          node -e 'const m=require("fs").readFileSync("index.html","utf8").match(/<script>([\s\S]*)<\/script>/); new Function(m[1]); console.log("index.html OK")'
          node -e 'new Function(require("fs").readFileSync("sw.js","utf8")); console.log("sw.js OK")'
          node -e 'JSON.parse(require("fs").readFileSync("manifest.webmanifest","utf8")); console.log("manifest OK")'
      - name: テスト実行
        run: node tests/app.test.js
