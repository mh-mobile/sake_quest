<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="72%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#3a2c16"/>
      <stop offset="45%" stop-color="#241c12"/>
      <stop offset="100%" stop-color="#140f0a"/>
    </radialGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd061"/>
      <stop offset="55%" stop-color="#f0a832"/>
      <stop offset="100%" stop-color="#c9821a"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#efe3cf"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="#4a3a22" stroke-width="3" opacity="0.6"/>

  <!-- handle -->
  <path d="M330 232 q78 0 78 66 q0 66 -78 66" fill="none" stroke="url(#beer)" stroke-width="30" stroke-linecap="round"/>

  <!-- mug body -->
  <rect x="150" y="212" width="185" height="212" rx="26" fill="url(#beer)"/>
  <!-- inner highlight -->
  <rect x="168" y="230" width="30" height="176" rx="15" fill="#fff2cf" opacity="0.5"/>
  <!-- fill lines -->
  <rect x="150" y="300" width="185" height="8" fill="#d99422" opacity="0.55"/>
  <rect x="150" y="356" width="185" height="8" fill="#d99422" opacity="0.55"/>

  <!-- foam -->
  <g fill="url(#foam)">
    <ellipse cx="196" cy="196" rx="46" ry="40"/>
    <ellipse cx="252" cy="180" rx="52" ry="46"/>
    <ellipse cx="310" cy="198" rx="44" ry="38"/>
    <rect x="150" y="196" width="185" height="30" rx="14"/>
  </g>

  <!-- bubbles -->
  <circle cx="228" cy="150" r="10" fill="#fffaf0" opacity="0.9"/>
  <circle cx="292" cy="138" r="7" fill="#fffaf0" opacity="0.8"/>
  <circle cx="258" cy="120" r="5" fill="#fffaf0" opacity="0.7"/>
</svg>
